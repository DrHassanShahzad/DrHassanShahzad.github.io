}

header{

color:white;
text-align:center;
background-size:cover;

}

nav{
background:white;

box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

nav a{
padding:15px 25px;

color:#333;

}

nav a:hover{
background:#222;

}

.container{
max-width:1100px;

padding:40px 20px;

footer{

<script>

const images = [
"fluid1.jpg",
"fluid2.jpg",
"fluid3.jpg",
"fluid4.jpg"
];

let i = 0;

function changeBackground(){

document.getElementById("hero").style.backgroundImage =
"url('" + images[i] + "')";

i++;

if(i >= images.length){
i = 0;
}

}

setInterval(changeBackground,3000);

changeBackground();

</script>
